name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Rollback target
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      ref:
        description: Git ref commit sha or tag to rollback to
        required: true
        type: string

jobs:
  rollback-backend-railway:
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout rollback ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Rollback deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_SERVICE_STAGING: ${{ secrets.RAILWAY_SERVICE_STAGING }}
          RAILWAY_SERVICE_PRODUCTION: ${{ secrets.RAILWAY_SERVICE_PRODUCTION }}
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
        run: |
          npm install -g @railway/cli

          TARGET_SERVICE="$RAILWAY_SERVICE"
          if [ "$DEPLOY_ENV" = "production" ] && [ -n "$RAILWAY_SERVICE_PRODUCTION" ]; then
            TARGET_SERVICE="$RAILWAY_SERVICE_PRODUCTION"
          fi

          if [ "$DEPLOY_ENV" = "staging" ] && [ -n "$RAILWAY_SERVICE_STAGING" ]; then
            TARGET_SERVICE="$RAILWAY_SERVICE_STAGING"
          fi

          if [ -n "$TARGET_SERVICE" ]; then
            railway up --service "$TARGET_SERVICE"
          else
            railway up
          fi

  rollback-frontend-vercel:
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout rollback ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel Environment
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build rollback artifacts
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            npx vercel build --prod --token="$VERCEL_TOKEN"
          else
            npx vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Rollback deploy to Vercel
        env:
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          else
            npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"
          fi
