name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        default: auto
        options:
          - auto
          - staging
          - production
      ref:
        description: Optional git ref to deploy
        required: false
        type: string
  push:
    branches:
      - main
      - master
      - develop

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.resolve.outputs.deploy_env }}
      ref_to_deploy: ${{ steps.resolve.outputs.ref_to_deploy }}
    steps:
      - name: Resolve deployment target
        id: resolve
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
          INPUT_REF: ${{ github.event.inputs.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          DEPLOY_ENV="$INPUT_ENV"
          if [ -z "$DEPLOY_ENV" ] || [ "$DEPLOY_ENV" = "auto" ]; then
            if [ "$REF_NAME" = "main" ] || [ "$REF_NAME" = "master" ]; then
              DEPLOY_ENV="production"
            else
              DEPLOY_ENV="staging"
            fi
          fi

          REF_TO_DEPLOY="$INPUT_REF"
          if [ -z "$REF_TO_DEPLOY" ]; then
            REF_TO_DEPLOY="$SHA"
          fi

          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "ref_to_deploy=$REF_TO_DEPLOY" >> "$GITHUB_OUTPUT"

  deploy-backend-railway:
    runs-on: ubuntu-latest
    needs: resolve-target
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.ref_to_deploy }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_SERVICE_STAGING: ${{ secrets.RAILWAY_SERVICE_STAGING }}
          RAILWAY_SERVICE_PRODUCTION: ${{ secrets.RAILWAY_SERVICE_PRODUCTION }}
          DEPLOY_ENV: ${{ needs.resolve-target.outputs.deploy_env }}
        run: |
          npm install -g @railway/cli

          TARGET_SERVICE="$RAILWAY_SERVICE"
          if [ "$DEPLOY_ENV" = "production" ] && [ -n "$RAILWAY_SERVICE_PRODUCTION" ]; then
            TARGET_SERVICE="$RAILWAY_SERVICE_PRODUCTION"
          fi

          if [ "$DEPLOY_ENV" = "staging" ] && [ -n "$RAILWAY_SERVICE_STAGING" ]; then
            TARGET_SERVICE="$RAILWAY_SERVICE_STAGING"
          fi

          if [ -n "$TARGET_SERVICE" ]; then
            railway up --service "$TARGET_SERVICE"
          else
            railway up
          fi

  deploy-frontend-vercel:
    runs-on: ubuntu-latest
    needs: resolve-target
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.ref_to_deploy }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel Environment
        env:
          DEPLOY_ENV: ${{ needs.resolve-target.outputs.deploy_env }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build Project Artifacts
        env:
          DEPLOY_ENV: ${{ needs.resolve-target.outputs.deploy_env }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            npx vercel build --prod --token="$VERCEL_TOKEN"
          else
            npx vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy to Vercel
        env:
          DEPLOY_ENV: ${{ needs.resolve-target.outputs.deploy_env }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ "$DEPLOY_ENV" = "production" ]; then
            npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          else
            npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"
          fi
